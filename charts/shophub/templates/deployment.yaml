apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shophub.fullname" . }}
  labels:
    {{- include "shophub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shophub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shophub.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "shophub.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
